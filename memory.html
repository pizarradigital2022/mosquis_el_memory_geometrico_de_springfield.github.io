<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Geométrico de Springfield</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght=700&display=swap');

        :root {
            --amarillo-simpson: #FFD90F;
            --azul-marge: #2997FF;
            --rosa-donut: #FF69B4;
            --blanco: #FFFFFF;
        }

        body {
            font-family: 'Comic Neue', 'Comic Sans MS', cursive, sans-serif;
            background-color: var(--azul-marge);
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--blanco);
            border: 5px solid #000;
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 900px;
            box-shadow: 10px 10px 0px #000;
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            color: #000;
            -webkit-text-stroke: 1px var(--amarillo-simpson);
            font-size: 2.5rem;
            margin-top: 0;
        }

        .zona-imagen {
            width: 100%;
            height: 130px;
            background-color: #e0e0e0;
            border: 3px dashed #000;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-style: italic;
            color: #666;
        }

        button, select {
            background-color: var(--amarillo-simpson);
            color: #000;
            font-family: inherit;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 10px 20px;
            border: 3px solid #000;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 4px 4px 0px #000;
            transition: transform 0.1s;
        }

        button:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000;
        }

        input[type="text"], input[type="number"], select {
            font-family: inherit;
            padding: 8px;
            font-size: 1rem;
            border: 3px solid #000;
            border-radius: 8px;
            margin: 5px;
        }

        .pantalla { display: none; }
        .activa { display: block; }

        .config-seccion {
            margin: 15px 0;
            padding: 10px;
            border-bottom: 2px dashed #ccc;
        }

        #inputs-grupos {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .info-juego {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background-color: var(--amarillo-simpson);
            border: 3px solid #000;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 20px;
            font-size: 1.2rem;
            flex-wrap: wrap;
            gap: 10px;
        }

        .turno-actual {
            background-color: var(--rosa-donut);
            padding: 5px 10px;
            border-radius: 5px;
            border: 2px solid #000;
        }

        .reloj {
            background-color: #fff;
            padding: 5px 15px;
            border: 2px solid #000;
            border-radius: 5px;
            font-weight: bold;
            color: #d9534f;
        }

        .tablero {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin-top: 20px;
        }

        @media (max-width: 700px) {
            .tablero { grid-template-columns: repeat(4, 1fr); }
        }

        .carta {
            height: 100px;
            background-color: var(--rosa-donut);
            border: 3px solid #000;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            font-weight: bold;
            padding: 5px;
            box-shadow: 3px 3px 0px #000;
            user-select: none;
            text-align: center;
            box-sizing: border-box;
            overflow: hidden;
        }

        .carta.volteada {
            background-color: var(--blanco);
        }

        .carta.emparejada {
            background-color: #87CEEB;
            visibility: hidden; 
        }

        .carta mjx-container {
            font-size: 1.1rem !important;
            margin: 0 !important;
        }

        .lista-resultados {
            list-style: none;
            padding: 0;
            font-size: 1.4rem;
        }
        .lista-resultados li {
            margin: 10px 0;
            padding: 10px;
            border-bottom: 2px dashed #000;
        }
        .ganador {
            font-size: 2rem;
            color: #d9534f;
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="pantalla-inicio" class="pantalla activa">
            <div class="zona-imagen">[Espacio para Imagen de Inicio - Los Simpson]</div>
            <h1>¡Multiplícate por cero! <br>El Memory de Geometría</h1>
            
            <div class="config-seccion">
                <label><b>Tiempo máximo de juego:</b></label>
                <select id="tiempo-limite">
                    <option value="10">10 Minutos</option>
                    <option value="30">30 Minutos</option>
                    <option value="60">60 Minutos</option>
                </select>
            </div>

            <div class="config-seccion">
                <label><b>Cantidad de equipos:</b></label>
                <input type="number" id="num-grupos" min="1" max="6" value="2" onchange="generarInputsGrupos()">
                <div id="inputs-grupos"></div>
            </div>

            <button onclick="iniciarJuego()">¡Al tajo!</button>
        </div>

        <div id="pantalla-juego" class="pantalla">
            <div class="zona-imagen">[Espacio para Imagen de Juego - Aula de Bart]</div>
            <div class="info-juego">
                <div id="marcador-turnos">Turno de: <span id="grupo-actual" class="turno-actual">-</span></div>
                <div class="reloj">Tiempo: <span id="cuenta-atras">00:00</span></div>
                <div id="puntuaciones-vivas"></div>
            </div>
            <div class="tablero" id="tablero"></div>
        </div>

        <div id="pantalla-resultados" class="pantalla">
            <div class="zona-imagen">[Espacio para Imagen de Fin - Celebración]</div>
            <h1>Resultados Finales</h1>
            <div id="ganador-anuncio" class="ganador"></div>
            <ul id="lista-puntuaciones" class="lista-resultados"></ul>
            <button onclick="reiniciarJuego()">¿Otro examen de reválida? (Volver a jugar)</button>
        </div>
    </div>

    <script>
        const bancoFormulas = [
            { nombre: "Teorema de Pitágoras", expresion: "$$a^2 + b^2 = c^2$$" },
            { nombre: "Área del Triángulo", expresion: "$$A = \\frac{b \\cdot h}{2}$$" },
            { nombre: "Área del Círculo", expresion: "$$A = \\pi \\cdot r^2$$" },
            { nombre: "Longitud Circunferencia", expresion: "$$L = 2 \\cdot \\pi \\cdot r$$" },
            { nombre: "Área del Trapecio", expresion: "$$A = \\frac{(B + b) \\cdot h}{2}$$" },
            { nombre: "Área Polígono Regular", expresion: "$$A = \\frac{P \\cdot a}{2}$$" },
            { nombre: "Volumen del Cilindro", expresion: "$$V = \\pi \\cdot r^2 \\cdot h$$" },
            { nombre: "Volumen del Cono", expresion: "$$V = \\frac{\\pi \\cdot r^2 \\cdot h}{3}$$" },
            { nombre: "Volumen de la Esfera", expresion: "$$V = \\frac{4}{3} \\cdot \\pi \\cdot r^3$$" },
            { nombre: "Volumen del Prisma", expresion: "$$V = A_{\\text{base}} \\cdot h$$" },
            { nombre: "Teorema de Tales", expresion: "$$\\frac{AB}{A'B'} = \\frac{BC}{B'C'}$$" },
            { nombre: "Ecuación de la Recta", expresion: "$$y = m \\cdot x + n$$" }
        ];

        let grupos = [];
        let turnoActual = 0;
        let cartas = [];
        let cartasVolteadas = [];
        let bloqueado = false;
        let intervaloTemporizador;
        let tiempoRestanteSegundos = 0;

        window.onload = function() {
            generarInputsGrupos();
        };

        function generarInputsGrupos() {
            const num = document.getElementById('num-grupos').value;
            const contenedor = document.getElementById('inputs-grupos');
            if(contenedor) {
                contenedor.innerHTML = '';
                for (let i = 1; i <= num; i++) {
                    contenedor.innerHTML += `<div>
                        <label>Grupo ${i}: </label>
                        <input type="text" class="nombre-grupo" value="Equipo ${i}">
                    </div>`;
                }
            }
        }

        function cambiarPantalla(id) {
            document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
            const p = document.getElementById(id);
            if(p) p.classList.add('activa');
        }

        function iniciarJuego() {
            const inputs = document.querySelectorAll('.nombre-grupo');
            grupos = [];
            inputs.forEach(input => {
                grupos.push({ nombre: input.value, puntos: 0 });
            });

            turnoActual = 0;
            cartasVolteadas = [];
            bloqueado = false;

            const minutosSeleccionados = parseInt(document.getElementById('tiempo-limite').value);
            tiempoRestanteSegundos = minutosSeleccionados * 60;
            actualizarRelojGrafico();
            
            clearInterval(intervaloTemporizador);
            intervaloTemporizador = setInterval(controlarTiempo, 1000);
            
            actualizarMarcadores();
            crearTablero();
            cambiarPantalla('pantalla-juego');
        }

        function controlarTiempo() {
            tiempoRestanteSegundos--;
            actualizarRelojGrafico();

            if (tiempoRestanteSegundos <= 0) {
                clearInterval(intervaloTemporizador);
                alert("¡Se acabó el tiempo! ¡Al contenedor de las estadísticas de cabeza!");
                finalizarJuego();
            }
        }

        function actualizarRelojGrafico() {
            const minutos = Math.floor(tiempoRestanteSegundos / 60);
            const segundos = tiempoRestanteSegundos % 60;
            document.getElementById('cuenta-atras').innerText = 
                `${minutos.toString().padStart(2, '0')}:${segundos.toString().padStart(2, '0')}`;
        }

        function crearTablero() {
            const contenedorTablero = document.getElementById('tablero');
            contenedorTablero.innerHTML = '';

            let baraja = [];
            bancoFormulas.forEach((item, index) => {
                baraja.push({ id: index, contenido: item.nombre, tipo: 'nombre' });
                baraja.push({ id: index, contenido: item.expresion, tipo: 'expresion' });
            });

            baraja.sort(() => Math.random() - 0.5);
            cartas = baraja;

            cartas.forEach((carta, index) => {
                const elementoCarta = document.createElement('div');
                elementoCarta.classList.add('carta');
                elementoCarta.dataset.index = index;
                elementoCarta.innerText = "❓"; 
                elementoCarta.addEventListener('click', voltearCarta);
                contenedorTablero.appendChild(elementoCarta);
            });
        }

        function voltearCarta() {
            if (bloqueado) return;
            const index = this.dataset.index;
            const cartaSeleccionada = cartas[index];

            if (this.classList.contains('volteada') || this.classList.contains('emparejada')) return;

            this.classList.add('volteada');
            this.innerHTML = cartaSeleccionada.contenido;

            if (cartaSeleccionada.tipo === 'expresion' && window.MathJax) {
                MathJax.typesetPromise([this]);
            }

            cartasVolteadas.push({ elemento: this, datos: cartaSeleccionada });

            if (cartasVolteadas.length === 2) {
                comprobarPareja();
            }
        }

        function comprobarPareja() {
            bloqueado = true;
            const [c1, c2] = cartasVolteadas;

            if (c1.datos.id === c2.datos.id && c1.datos.tipo !== c2.datos.tipo) {
                setTimeout(() => {
                    c1.elemento.classList.add('emparejada');
                    c2.elemento.classList.add('emparejada');
                    grupos[turnoActual].puntos++;
                    cartasVolteadas = [];
                    bloqueado = false;
                    actualizarMarcadores();
                    comprobarFinJuego();
                }, 800);
            } else {
                setTimeout(() => {
                    c1.elemento.classList.remove('volteada');
                    c2.elemento.classList.remove('volteada');
                    c1.elemento.innerHTML = "❓";
                    c2.elemento.innerHTML = "❓";
                    cartasVolteadas = [];
                    bloqueado = false;
                    
                    turnoActual = (turnoActual + 1) % grupos.length;
                    actualizarMarcadores();
                }, 1500);
            }
        }

        function actualizarMarcadores() {
            document.getElementById('grupo-actual').innerText = grupos[turnoActual].nombre;
            const contenedorPuntos = document.getElementById('puntuaciones-vivas');
            contenedorPuntos.innerHTML = grupos.map(g => `${g.nombre}: <b>${g.puntos}</b>`).join(' | ');
        }

        function comprobarFinJuego() {
            const cartasEmparejadas = document.querySelectorAll('.carta.emparejada').length;
            if (cartasEmparejadas === cartas.length) {
                clearInterval(intervaloTemporizador);
                finalizarJuego();
            }
        }

        function finalizarJuego() {
            clearInterval(intervaloTemporizador);
            const clasificacion = [...grupos].sort((a, b) => b.puntos - a.puntos);
            
            let textoGanador = "";
            if (clasificacion.length > 1 && clasificacion[0].puntos === clasificacion[1].puntos) {
                textoGanador = "¡Empate técnico! ¡Nadie se queda sin rosquilla! 🍩";
            } else {
                textoGanador = `¡El ganador es: ${clasificacion[0].nombre}! 🏆`;
            }

            document.getElementById('ganador-anuncio').innerText = textoGanador;

            const lista = document.getElementById('lista-puntuaciones');
            lista.innerHTML = '';
            clasificacion.forEach((g, index) => {
                lista.innerHTML += `<li>#${index + 1} <b>${g.nombre}</b> — Acertó ${g.puntos} parejas</li>`;
            });

            cambiarPantalla('pantalla-resultados');
        }

        function reiniciarJuego() {
            cambiarPantalla('pantalla-inicio');
        }
    </script>

    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</body>
</html>
